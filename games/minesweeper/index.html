<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <title>Minesweeper — Nostalgic Arcade</title>
  <style>
    html, body {
      margin: 0;
      height: 100%;
      background: #000;
      overflow: hidden;
      overscroll-behavior: none;
      touch-action: none;
      -webkit-user-select: none;
      user-select: none;
    }
    body {
      display: flex;
      align-items: center;
      justify-content: center;
    }
    /* The canvas fills the viewport; the square minefield is letterboxed inside
       it (maximised — full height in landscape) and the chrome (FINISH / NEW,
       the DIG/FLAG toggle, mine + timer readouts, instructions) is drawn into
       the space around it. */
    #game {
      display: block;
      background: #000;
    }
  </style>
</head>
<body>
  <canvas id="game"></canvas>

  <script src="../../shared/ng.js"></script>
  <script src="../../shared/touch.js"></script>
  <script src="minesweeper.js"></script>
  <!-- FINISH / NEW, the DIG/FLAG toggle, the difficulty chip and the readouts
       are drawn on the canvas and handled in minesweeper.js; ESC / BACK / HOME
       also leave for the catalogue (NG.onExit). -->
</body>
</html>
