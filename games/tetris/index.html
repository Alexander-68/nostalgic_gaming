<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <title>Tetra Drop — Nostalgic Arcade</title>
  <style>
    html, body {
      margin: 0;
      height: 100%;
      background: #000;
      overflow: hidden;
      overscroll-behavior: none;
      touch-action: none;
      -webkit-user-select: none;
      user-select: none;
    }
    body {
      display: flex;
      align-items: center;
      justify-content: center;
    }
    /* The canvas fills the viewport; the 10x20 well(s) are letterboxed inside it
       (maximised) and all chrome — title menu, NEXT / HOLD / score panels, the
       FINISH button and the robot toggles — is drawn on the canvas and handled
       in tetris.js. ESC / BACK / HOME also leave for the catalogue (NG.onExit). */
    #game {
      display: block;
      background: #000;
    }
  </style>
</head>
<body>
  <canvas id="game"></canvas>

  <script src="../../shared/ng.js"></script>
  <script src="../../shared/touch.js"></script>
  <script src="tetris.js"></script>
</body>
</html>
